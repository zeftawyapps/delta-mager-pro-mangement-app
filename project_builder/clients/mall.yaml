# 📱 إعدادات عميل Mall
appBranding:
  appTitle: "Matger Pro Mall"
  defaultOrgName: "mall"

# 🚀 توافق الإصدارات
appVersion: "1.0.0"
appBuildIndex: 1
env: "prod"

# 🔗 روابط API
envUrls:
  local:
    baseUrl: "http://localhost:8080/api/v1"
    imageUrl: "http://localhost:8080"
  dev:
    baseUrl: "https://matger-mall-754150733984.me-central1.run.app/api/v1"
    imageUrl: "https://matger-mall-754150733984.me-central1.run.app"
  prod:
    baseUrl: "https://matger-mall-754150733984.me-central1.run.app/api/v1"
    imageUrl: "https://matger-mall-754150733984.me-central1.run.app"

# 🔥 Firebase لكل تطبيق
firebase:
  project: "domansy-dev"
  hosting:
    dashboard: "mall-orgs"
    admin: "mall-admin"

# 🧱 البناء والرفع لكل تطبيق
apps:
  dashboard:
    buildTarget: "lib/main_dashboard.dart"
    hostingSite: "mall-orgs"
  admin:
    buildTarget: "lib/main_admin.dart"
    hostingSite: "mall-admin"
