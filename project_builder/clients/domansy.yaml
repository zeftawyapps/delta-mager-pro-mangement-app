# 📱 إعدادات عميل Domansy
appBranding:
  appTitle: "Domancy"
  defaultOrgName: "domacy"

# 🚀 توافق الإصدارات
appVersion: "1.0.0"
appBuildIndex: 3
env: "prod"

# 🔗 روابط API
envUrls:
  local:
    baseUrl: "http://localhost:8080/api/v1"
    imageUrl: "http://localhost:8080"
  dev:
    baseUrl: "https://deltamatger-dev-804546043960.europe-west1.run.app/api/v1"
    imageUrl: "https://deltamatger-dev-804546043960.europe-west1.run.app"
  prod:
    baseUrl: "https://matger-domancy-754150733984.me-central1.run.app/api/v1"
    imageUrl: "https://matger-domancy-754150733984.me-central1.run.app"

# 🔥 Firebase لكل تطبيق
firebase:
  project: "domansy-dev"
  hosting:
    dashboard: "domancy-orgs"
    admin: "domancy-admin"

# 🧱 البناء والرفع لكل تطبيق
apps:
  dashboard:
    buildTarget: "lib/main_dashboard.dart"
    hostingSite: "domancy-orgs"
  admin:
    buildTarget: "lib/main_admin.dart"
    hostingSite: "domancy-admin"
