# 📱 إعدادات عميل Factory
appBranding:
  appTitle: "Matger Pro Factory"
  defaultOrgName: "factory"

# 🚀 توافق الإصدارات
appVersion: "1.0.0"
appBuildIndex: 1
env: "prod"

# 🔗 روابط API
envUrls:
  local:
    baseUrl: "http://localhost:8080/api/v1"
    imageUrl: "http://localhost:8080"
  dev:
    baseUrl: "https://matger-factory-754150733984.me-central1.run.app/api/v1"
    imageUrl: "https://matger-factory-754150733984.me-central1.run.app"
  prod:
    baseUrl: "https://matger-factory-754150733984.me-central1.run.app/api/v1"
    imageUrl: "https://matger-factory-754150733984.me-central1.run.app"

# 🔥 Firebase لكل تطبيق
firebase:
  project: "domansy-dev"
  hosting:
    dashboard: "factory-orgs"
    admin: "factory-admin"

# 🧱 البناء والرفع لكل تطبيق
apps:
  dashboard:
    buildTarget: "lib/main_dashboard.dart"
    hostingSite: "factory-orgs"
  admin:
    buildTarget: "lib/main_admin.dart"
    hostingSite: "factory-admin"
